<!DOCTYPE html>
<html>
<head>
    <title>Add Bike</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="
    background-color: #fff3f3;
    background-image: radial-gradient(#801c53 1px, transparent 1px);
    background-size: 20px 20px;
    color: white;
">

<div class="container mt-5">

    <h3> Add New Bike</h3>

    <form method="POST">
        <input type="text" name="brand" placeholder="ชื่อยี่ห่อ" class="form-control mb-2" required>
        <input type="text" name="name" placeholder="ชื่อรุ่น" class="form-control mb-2" required>
        <input type="text" name="image_url" placeholder="Image URL" class="form-control mb-2" required>
        <input type="number" name="price" placeholder="ราคา" class="form-control mb-2" required>
        <input type="number" name="weight" placeholder="น้ำหนัก" class="form-control mb-2" required>

        <button class="btn" style="background-color: rgb(45, 43, 80); color: white;" >Add Bike</button>
        <a href="/home" class="btn btn-secondary">Back</a>
    </form>

</div>

</body>
</html>
