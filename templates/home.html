<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f0f0f0; color: #333333; padding-top: 70px;">



    <!-- แถบ -->
<div class="container mt-1">

    <nav class="navbar navbar-dark px-4 fixed-top" style="background-color: #3e4352;">

    
    <span class="navbar-brand fw-bold"> BigBike list</span>


    
    <div class="d-flex align-items-center gap-3">

           <img src="{{ url_for('static', filename='images/user.png') }} "  class="ms-2"
          alt="Profile Image" 
           width="30">


         <span class="text-white small fw-bold" >Hello {{ session['username'] }}</span>
        <span class="text-white small">User ID: {{ session['user_id'] }}</span>
        

        <div class="dropdown">
            <button class="btn btn-outline-light btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                 Profile
            </button>

                <ul class="dropdown-menu dropdown-menu-end">
                 <li><a class="dropdown-item" href="/profile">Profile</a></li>
                  <li><a class="dropdown-item" href="/home">Home</a></li>
                   <li><a class="dropdown-item" href="/logout">Logout</a></li>
                 </ul>
        </div>

    </div>

</nav>
<!-- จบแถบ -->


<form method="GET" action="/home" class="mb-3">
    <div class="d-flex gap-2">
        <input type="text" name="q" class="form-control" placeholder="Search bike name...">
        <button class="btn" style="background-color: rgb(45, 43, 80); color: white;">Search</button>
    </div>
</form>




<div style="margin-right: 1100px;">
        <a href="/add" class="btn" style="background-color: rgb(45, 43, 80); color: white;">+ Add Bike</a>
      </div>

<body>
    <span style="color:rgb(49, 49, 49); font-weight: bold; font-size: 24px;">My BigBike list</span>


</body>


    <!--แสดงรถ -->
    <div class="row">
        {% for bike in bikes %}
        <div class="col-md-4">
            <div class="card mb-4">
                <a href="/bike/{{ bike.id }}" class="btn" style="background-color: rgb(45, 43, 80); color: white;" >View</a>

                <img src="{{ bike.image_url }}" class="card-img-top" style="height:200px; object-fit:cover;">

                <div class="card-body">
                    <h5>{{ bike.name }}</h5>
                    <p> ยี่ห่อ {{ bike.brand }} </p>
                    <p>💰 {{ bike.price }} บาท</p>
                    <p>⚖️ {{ bike.weight }} kg</p>

                    <a href="/delete/{{ bike.id }}" class="btn btn-danger btn-sm">Delete</a>
                    <a href="/edit/{{ bike.id }}" class="btn btn-warning btn-sm">Edit</a>
                </div>

            </div>
        </div>
        {% endfor %}
    </div>
     <!--จบแสดงรถ -->
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
