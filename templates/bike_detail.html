<!DOCTYPE html>
<html>
<head>
    <title>Bike Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #ffffff; color: #303030;">

<div class="container mt-5">

    <h2>{{ bike.brand }} {{ bike.name }}</h2>

    <img src="{{ bike.image_url }}" class="img-fluid mb-3" width="400">

    <p><b>Price:</b> {{ bike.price }} บาท</p>
    <p><b>Weight:</b> {{ bike.weight }} kg</p>

    <a href="/home" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
