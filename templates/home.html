<!DOCTYPE html>
<html>
<head>

    <style>
/* icon animation */
.icon-hover {
    display: inline-block;
    transition: all 0.2s ease;
}

.icon-hover:hover {
    transform: translateY(-2px) scale(1.1);
}
</style>

    <title>Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="
    background-color: #fff3f3;
    background-image: radial-gradient(#801c53 1px, transparent 1px);
    background-size: 20px 20px;
">

<!-- navbar -->
<nav class="navbar navbar-dark px-4 fixed-top" style="background-color: rgb(127, 46, 46);">
    
    <span class="navbar-brand fw-bold">BigBike list</span>

    <div class="d-flex align-items-center gap-3">
        <img src="{{ url_for('static', filename='images/user.png') }}" width="30">

        <span class="text-white small fw-bold">
            Hello {{ session['username'] }}
        </span>

        <div class="dropdown">
            <button class="btn btn-outline-light btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                Profile
            </button>

            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="/profile">Profile</a></li>
                <li><a class="dropdown-item" href="/home">Home</a></li>
                <li><a class="dropdown-item" href="/logout">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- container -->
<div class="container" style="margin-top: 90px;">

    <!-- TOP BAR (Search + Add) -->
    <div class="d-flex justify-content-between align-items-center mb-4">
       
        <!-- Search -->
        <form method="GET" action="/home" class="d-flex gap-2 w-50">
            <input type="text" name="q" class="form-control" placeholder="Search bike name...">
            <button class="btn icon-hover" style="background-color: rgb(127, 46, 46); color: white;">
                Search
            </button>
        </form>

       

    </div>

    <!-- Title -->
    <h4 class="mb-4" style="color:#333;">My BigBike list</h4>
         

     <!-- Add Bike -->
        <a href="/add" class="btn icon-hover" style="background-color: rgb(127, 46, 46); color: white;">
            + Add Bike
        </a>

        
    <!-- Cards -->
    <div class="row g-4">
        {% for bike in bikes %}
        <div class="col-md-4">

            <div class="card h-100 shadow-sm">

                <!-- Image -->
                <img src="{{ bike.image_url }}" class="card-img-top" style="height:200px; object-fit:cover;">

                <!-- Body -->
                <div class="card-body">

                    <h5 class="fw-bold">{{ bike.name }}</h5>
                    <p class="text-muted mb-1">ยี่ห้อ {{ bike.brand }}</p>

                    <p class="mb-1">💰 {{ bike.price }} บาท</p>
                    <p>⚖️ {{ bike.weight }} kg</p>

                    <!-- Buttons -->
                    <div class="d-flex gap-2 mt-3">
                        <a href="/bike/{{ bike.id }}" class="btn btn-sm text-white icon-hover" style="background-color: rgb(127, 46, 46);">
                            View
                        </a>

                        <a href="/edit/{{ bike.id }}" class="btn btn-warning btn-sm icon-hover">
                            Edit
                        </a>

                        <a href="/delete/{{ bike.id }}" class="btn btn-danger btn-sm icon-hover">
                            Delete
                        </a>
                    </div>

                </div>
            </div>

        </div>
        {% endfor %}
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
