<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f0f0f0; color: #333333; padding-top: 70px;">

<div class="container d-flex justify-content-center align-items-center" style="height: 80vh;">
     
    
    <div class="card p-3 text-dark">

            <h2>
        <img src="{{ url_for('static', filename='images/user.png') }} "  class="ms-2"
          alt="Profile Image" 
           width="30">
        Profile</h2>

        <p><strong>Username:</strong> {{ user.username }}</p>
        <p><strong>User ID: </strong> {{ session['user_id'] }}</p>

        <hr>

        <h5>Change Password</h5>

        <form method="POST">
            <input type="password" name="password" placeholder="New Password" class="form-control mb-2" required>

            <button class="btn btn-primary">Update Password</button>
            <a href="/home" class="btn btn-secondary">Back</a>
        </form>
    </div>

</div>

</body>
</html>
