<!DOCTYPE html>
<html>
<head>
    <title>Edit Bike</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="
    background-color: #fff3f3;
    background-image: radial-gradient(#801c53 1px, transparent 1px);
    background-size: 20px 20px;
    color: white;
">

<div class="container mt-5">

    <h3>Edit Bike</h3>

    <form method="POST">
    <input type="text" name="brand" value="{{ bike.brand }}" class="form-control mb-2" required>
    
    <input type="text" name="name" value="{{ bike.name }}" class="form-control mb-2" required>
    
    <input type="text" name="image_url" value="{{ bike.image_url }}" class="form-control mb-2" required>
    
    <input type="number" name="price" value="{{ bike.price }}" class="form-control mb-2" required>
    
    <input type="number" name="weight" value="{{ bike.weight }}" class="form-control mb-2" required>

    <button class="btn btn-warning">Update</button>
    <a href="/home" class="btn btn-secondary">Back</a>
</form>

</div>

</body>
</html>
